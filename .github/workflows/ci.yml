name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: python-microservice
  GAR_REGISTRY: us-west1-docker.pkg.dev
  GAR_REPOSITORY: us-west1-docker.pkg.dev/gen-lang-client-0110201077/apps-images

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Lint
  # ─────────────────────────────────────────
  lint:
    name: Lint
    runs-on: [self-hosted, docker, linux]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: |
          pip install flake8 black isort

      - name: Run flake8 (style + syntax errors)
        run: flake8 . --max-line-length=100 --exclude=.venv,__pycache__

      - name: Run black (code formatting check)
        run: black --check --line-length=100 .

      - name: Run isort (import order check)
        run: isort --check-only --profile=black .

  # ─────────────────────────────────────────
  # JOB 2: Semgrep SAST Scan
  # ─────────────────────────────────────────
  semgrep:
    name: Semgrep SAST Scan
    runs-on: [self-hosted, docker, linux]
    needs: lint

    permissions:
      contents: read
      security-events: write   # required to upload SARIF to GitHub Security tab

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST scan
        run: |
          pip install semgrep
          semgrep scan --config p/python --config p/owasp-top-ten --config p/secrets \
            --sarif --output semgrep.sarif . || true

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

  # ─────────────────────────────────────────
  # JOB 3: Build Docker Image
  # ─────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: [self-hosted, docker, linux]
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

  # ─────────────────────────────────────────
  # JOB 4: Docker Image Scan (Trivy)
  # ─────────────────────────────────────────
  docker-scan:
    name: Docker Image Scan (Trivy)
    runs-on: [self-hosted, docker, linux]
    needs: docker-build
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Run Trivy — upload SARIF to GitHub Security tab
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ─────────────────────────────────────────
  # JOB 5: Push to GCP Artifact Registry
  # ─────────────────────────────────────────
  push-to-gar:
    name: Push to GCP Artifact Registry
    runs-on: [self-hosted, docker, linux]
    needs: [docker-scan, semgrep]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_REGISTRY }} --quiet

      - name: Tag image for Artifact Registry
        run: |
          docker tag $IMAGE_NAME:${{ github.sha }} \
            ${{ env.GAR_REPOSITORY }}/$IMAGE_NAME:${{ github.sha }}
          docker tag $IMAGE_NAME:${{ github.sha }} \
            ${{ env.GAR_REPOSITORY }}/$IMAGE_NAME:latest

      - name: Push image to Artifact Registry
        run: |
          docker push ${{ env.GAR_REPOSITORY }}/$IMAGE_NAME:${{ github.sha }}
          docker push ${{ env.GAR_REPOSITORY }}/$IMAGE_NAME:latest

      - name: Print image URI
        run: |
          echo "Image pushed to:"
          echo "${{ env.GAR_REPOSITORY }}/$IMAGE_NAME:${{ github.sha }}"
          echo "${{ env.GAR_REPOSITORY }}/$IMAGE_NAME:latest"
